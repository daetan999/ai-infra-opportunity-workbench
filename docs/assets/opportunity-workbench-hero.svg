<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title>Opportunity Workbench</title>
  <desc>A synthetic enterprise account workspace showing an account portfolio, qualification score, evidence timeline, buying group, and next best action.</desc>
  <defs>
    <linearGradient id="background" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07101b"/>
      <stop offset="1" stop-color="#0d1b29"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#142235"/>
      <stop offset="1" stop-color="#0f1a28"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000814" flood-opacity=".35"/>
    </filter>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #8999ab; font-size: 14px; font-weight: 700; letter-spacing: 1.7px; }
      .heading { fill: #eef4fa; font-size: 26px; font-weight: 750; }
      .body { fill: #c3cfdb; font-size: 16px; }
      .small { fill: #8999ab; font-size: 14px; }
      .micro { fill: #8999ab; font-size: 12px; }
      .accent { fill: #64d8bd; }
      .rule { stroke: #26364a; stroke-width: 1; }
    </style>
    <style>
      /* The GitHub preview mirrors the warm field-journal application theme. */
      text { font-family: Georgia, "Times New Roman", serif !important; }
      .label, .small, .micro { font-family: "Azeret Mono", "Courier New", monospace !important; }
      .heading { fill: #2b2923 !important; }
      .body { fill: #504b40 !important; }
      .small, .micro { fill: #6d6659 !important; }
      .accent { fill: #b24e32 !important; }
      .rule { stroke: #cdbfa9 !important; }
      stop[stop-color="#07101b"] { stop-color: #f4eee2 !important; }
      stop[stop-color="#0d1b29"] { stop-color: #e7dac7 !important; }
      stop[stop-color="#142235"] { stop-color: #fffaf0 !important; }
      stop[stop-color="#0f1a28"] { stop-color: #f8f0e2 !important; }
      [fill="#07101b"], [fill="#0d1b29"], [fill="#0a1420"] { fill: #f4eee2 !important; }
      [fill="#142235"], [fill="#0f1a28"], [fill="#132030"] { fill: #fffaf0 !important; }
      [fill="#070d16"] { fill: #25372d !important; }
      [fill="#0d1724"] { fill: #ece0ce !important; }
      [fill="#10252b"] { fill: #e8dcc8 !important; }
      [fill="#102d2a"] { fill: #3d4a35 !important; }
      [fill="#132e2d"] { fill: #e4eadf !important; }
      [fill="#352c1d"] { fill: #f3e0bb !important; }
      [fill="#eef4fa"] { fill: #2b2923 !important; }
      [fill="#c3cfdb"] { fill: #504b40 !important; }
      [fill="#8999ab"], [fill="#657589"] { fill: #6d6659 !important; }
      [fill="#64d8bd"], [fill="#82ead2"] { fill: #b24e32 !important; }
      [fill="#65d6a1"] { fill: #366a4b !important; }
      [fill="#f4c56b"] { fill: #a76d18 !important; }
      [fill="#06251f"] { fill: #fff9ef !important; }
      [stroke="#26364a"], [stroke="#2d4157"], [stroke="#3c506a"] { stroke: #cdbfa9 !important; }
      [stroke="#4f9b8c"], [stroke="#376f64"], [stroke="#397467"] { stroke: #8c9c76 !important; }
    </style>
  </defs>

  <rect width="1440" height="900" rx="22" fill="url(#background)"/>
  <circle cx="1260" cy="60" r="270" fill="#31566d" opacity=".12"/>

  <rect x="22" y="22" width="220" height="856" rx="16" fill="#070d16" stroke="#26364a"/>
  <rect x="48" y="49" width="42" height="42" rx="11" fill="#102d2a" stroke="#4f9b8c"/>
  <text x="69" y="76" fill="#82ead2" font-size="14" font-weight="900" text-anchor="middle">OW</text>
  <text x="105" y="65" fill="#eef4fa" font-size="16" font-weight="750">Opportunity</text>
  <text x="105" y="83" class="micro" letter-spacing="1.5">WORKBENCH</text>
  <line x1="47" y1="111" x2="217" y2="111" class="rule"/>

  <text x="49" y="154" class="micro" letter-spacing="1.5">WORKSPACE</text>
  <rect x="40" y="171" width="181" height="44" rx="9" fill="#132030" stroke="#2d4157"/>
  <rect x="40" y="171" width="3" height="44" rx="2" fill="#64d8bd"/>
  <text x="55" y="198" class="accent" font-size="12" font-weight="800">01</text>
  <text x="86" y="198" fill="#eef4fa" font-size="15" font-weight="700">Portfolio</text>
  <text x="55" y="248" fill="#657589" font-size="12" font-weight="800">02</text>
  <text x="86" y="248" class="small">Account workspace</text>
  <text x="55" y="294" fill="#657589" font-size="12" font-weight="800">03</text>
  <text x="86" y="294" class="small">Evidence</text>
  <text x="55" y="340" fill="#657589" font-size="12" font-weight="800">04</text>
  <text x="86" y="340" class="small">Decision</text>

  <rect x="40" y="748" width="181" height="99" rx="10" fill="#0d1724" stroke="#26364a"/>
  <circle cx="57" cy="772" r="5" fill="#64d8bd"/>
  <text x="70" y="777" fill="#eef4fa" font-size="13" font-weight="700">Evidence-first mode</text>
  <text x="56" y="803" class="micro">Hypotheses remain open</text>
  <text x="56" y="821" class="micro">until discovery confirms</text>
  <text x="56" y="839" class="micro">or rejects them.</text>

  <g filter="url(#shadow)">
    <rect x="265" y="22" width="1153" height="856" rx="16" fill="#0a1420" stroke="#26364a"/>
  </g>
  <line x1="265" y1="89" x2="1418" y2="89" class="rule"/>
  <text x="300" y="63" class="small">Revenue operations  /  <tspan fill="#c3cfdb" font-weight="700">Opportunity workbench</tspan></text>
  <circle cx="1234" cy="56" r="4" fill="#64d8bd"/>
  <text x="1247" y="62" class="micro">SANITIZED DATA</text>
  <rect x="1323" y="39" width="73" height="34" rx="8" fill="#142235" stroke="#3c506a"/>
  <text x="1359" y="61" fill="#c3cfdb" font-size="12" font-weight="700" text-anchor="middle">Export</text>

  <text x="300" y="132" class="label accent">OPPORTUNITY COMMAND CENTER</text>
  <text x="300" y="178" fill="#eef4fa" font-size="36" font-weight="760">From signal to a defensible next step.</text>
  <text x="300" y="207" class="body">Synthetic interface example · values are placeholders, not customer claims</text>

  <g>
    <rect x="300" y="239" width="255" height="112" rx="12" fill="url(#panel)" stroke="#26364a"/>
    <text x="321" y="270" class="label">ACTIVE ACCOUNTS</text>
    <text x="321" y="317" fill="#eef4fa" font-size="33" font-weight="760">4</text>
    <text x="321" y="338" class="micro">synthetic portfolio records</text>
    <rect x="570" y="239" width="255" height="112" rx="12" fill="url(#panel)" stroke="#26364a"/>
    <text x="591" y="270" class="label">EVIDENCE SIGNALS</text>
    <text x="591" y="317" fill="#eef4fa" font-size="33" font-weight="760">7</text>
    <text x="591" y="338" class="micro">dated and attributable</text>
    <rect x="840" y="239" width="255" height="112" rx="12" fill="url(#panel)" stroke="#26364a"/>
    <text x="861" y="270" class="label">QUALIFICATION</text>
    <text x="861" y="317" fill="#eef4fa" font-size="33" font-weight="760">64</text>
    <text x="908" y="317" class="small">/100 · developing</text>
    <rect x="1110" y="239" width="255" height="112" rx="12" fill="url(#panel)" stroke="#26364a"/>
    <text x="1131" y="270" class="label">BUYING GROUP</text>
    <text x="1131" y="317" fill="#eef4fa" font-size="33" font-weight="760">3</text>
    <text x="1131" y="338" class="micro">roles mapped</text>
  </g>

  <rect x="300" y="372" width="692" height="464" rx="14" fill="url(#panel)" stroke="#26364a"/>
  <text x="324" y="405" class="label accent">SELECTED ACCOUNT</text>
  <text x="324" y="438" class="heading">Enterprise platform account</text>
  <rect x="824" y="398" width="139" height="29" rx="15" fill="#132e2d" stroke="#376f64"/>
  <text x="894" y="417" fill="#65d6a1" font-size="11" font-weight="800" text-anchor="middle">DISCOVERY</text>
  <line x1="324" y1="458" x2="968" y2="458" class="rule"/>

  <text x="324" y="493" class="label">WORKLOAD HYPOTHESIS</text>
  <text x="324" y="528" class="body">A production AI workload may be constrained by</text>
  <text x="324" y="552" class="body">capacity and unit economics. Discovery must validate it.</text>

  <rect x="324" y="582" width="308" height="96" rx="10" fill="#0d1724" stroke="#26364a"/>
  <text x="342" y="609" class="micro">OBSERVED CONSTRAINT</text>
  <text x="342" y="638" fill="#eef4fa" font-size="16" font-weight="700">Not yet established</text>
  <text x="342" y="659" class="micro">Evidence gap remains visible</text>
  <rect x="649" y="582" width="319" height="96" rx="10" fill="#0d1724" stroke="#26364a"/>
  <text x="667" y="609" class="micro">VALIDATION METRIC</text>
  <text x="667" y="638" fill="#eef4fa" font-size="16" font-weight="700">Cost per successful request</text>
  <text x="667" y="659" class="micro">Baseline required before evaluation</text>

  <text x="324" y="721" class="label accent">EVIDENCE TIMELINE</text>
  <line x1="342" y1="750" x2="342" y2="806" stroke="#3c506a"/>
  <circle cx="342" cy="758" r="6" fill="#64d8bd"/>
  <text x="362" y="762" fill="#eef4fa" font-size="14" font-weight="700">Discovery record captured</text>
  <text x="362" y="784" class="small">Source and confidence travel with the signal</text>
  <circle cx="342" cy="808" r="6" fill="#64d8bd"/>
  <text x="362" y="812" fill="#eef4fa" font-size="14" font-weight="700">Technical baseline requested</text>

  <rect x="1010" y="372" width="355" height="212" rx="14" fill="url(#panel)" stroke="#26364a"/>
  <text x="1034" y="406" class="label accent">QUALIFICATION SCORECARD</text>
  <circle cx="1085" cy="487" r="50" fill="none" stroke="#26364a" stroke-width="10"/>
  <path d="M1085 437 A50 50 0 1 1 1047 519" fill="none" stroke="#64d8bd" stroke-width="10" stroke-linecap="round"/>
  <text x="1085" y="491" fill="#eef4fa" font-size="25" font-weight="800" text-anchor="middle">64</text>
  <text x="1085" y="510" class="micro" text-anchor="middle">/ 100</text>
  <rect x="1161" y="444" width="111" height="26" rx="13" fill="#352c1d" stroke="#775f32"/>
  <text x="1217" y="462" fill="#f4c56b" font-size="10" font-weight="800" text-anchor="middle">DEVELOPING</text>
  <text x="1161" y="494" class="small">Unknowns reduce score.</text>
  <text x="1161" y="517" class="small">Activity does not add it.</text>
  <text x="1161" y="540" class="small">Evidence is auditable.</text>

  <rect x="1010" y="600" width="355" height="236" rx="14" fill="#10252b" stroke="#397467"/>
  <text x="1034" y="635" class="label accent">NEXT BEST ACTION</text>
  <text x="1034" y="677" fill="#eef4fa" font-size="20" font-weight="750">Confirm the technical baseline</text>
  <text x="1034" y="705" class="body">with the workload owner.</text>
  <line x1="1034" y1="730" x2="1341" y2="730" class="rule"/>
  <text x="1034" y="759" class="micro">EXIT EVIDENCE</text>
  <text x="1034" y="783" class="small">Baseline, metric owner, and review date</text>
  <rect x="1034" y="800" width="168" height="28" rx="7" fill="#64d8bd"/>
  <text x="1118" y="819" fill="#06251f" font-size="11" font-weight="850" text-anchor="middle">OPEN DECISION PANEL</text>
</svg>
